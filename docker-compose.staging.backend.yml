services:
  postgres:
    image: postgres:16-alpine
    container_name: eos-postgres-staging
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5422:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eos-backend-staging
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: deployment
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3003:3003"
    # Host must mount Synology first (e.g. //NAS/APPs -> /mnt/synology/eos). Without this bind,
    # STORAGE_LOCAL_PATH under /mnt/synology/eos would be container-local disk, not the NAS.
    volumes:
      - /mnt/synology/eos:/mnt/synology/eos

volumes:
  postgres_data:
