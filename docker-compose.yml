# Exim Operation System (EOS) - Phase 1 Import
# Production-oriented setup suitable for local development.
# Usage: docker compose up

services:
  postgres:
    image: postgres:16-alpine
    container_name: eos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-eos_db}
    ports:
      # Host port 5433 to avoid conflict with existing PostgreSQL on 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eos} -d ${POSTGRES_DB:-eos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # One hop (e.g. Next.js → API) so X-Forwarded-For matches express-rate-limit expectations
      TRUST_PROXY: ${TRUST_PROXY:-1}
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER:-eos}:${POSTGRES_PASSWORD:-eos_dev_password}@postgres:5432/${POSTGRES_DB:-eos_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PPN_PERCENTAGE: ${PPN_PERCENTAGE:-11}
      PPH_PERCENTAGE: ${PPH_PERCENTAGE:-2.5}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      # Default: named volume. Override in .env for NAS bind (set STORAGE_HOST_BIND + STORAGE_LOCAL_PATH).
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
      # Allow both localhost and 127.0.0.1 so login works from either URL
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://127.0.0.1:3002}
      ALLOW_ANY_EMAIL: ${ALLOW_ANY_EMAIL:-false}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-energi-up.com}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3002}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@energi-up.com}
      # Default dev admin so login works out of the box. Set empty in production.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123}
    ports:
      - "${BACKEND_PORT:-3003}:3003"
    volumes:
      # Named volume by default, or bind e.g. STORAGE_HOST_BIND=/mnt/synology/eos to match STORAGE_LOCAL_PATH
      - ${STORAGE_HOST_BIND:-backend_uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      # Use frontEnd (capital E) so Linux Docker builds match the repo folder name
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/backend}
    container_name: eos-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:3003}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
