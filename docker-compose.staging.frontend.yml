services:
  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: eos-frontend-staging
    restart: unless-stopped
    env_file:
      - ./frontEnd/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
